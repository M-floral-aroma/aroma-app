<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dōTERRA 精油図鑑</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream:   #FAF7F2;
  --petal:   #F5EEE8;
  --blush:   #EDE0D8;
  --rose:    #C8948A;
  --sage:    #8AAE8A;
  --taupe:   #9A8878;
  --ink:     #3A3028;
  --muted:   #9A8A80;
  --divider: #E8DDD6;

  --floral:  #C48FA8;
  --woody:   #A8845C;
  --citrus:  #D4A040;
  --herbal:  #7AA878;
  --spicy:   #C06848;
  --earthy:  #8A7050;
  --blend:   #7A90A8;
}

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

/* ── HEADER ── */
header {
  background: linear-gradient(160deg, #F8F0EC 0%, #EDE4DC 100%);
  padding: 2.4rem 1.5rem 1.8rem;
  border-bottom: 1px solid var(--blush);
  position: relative;
  overflow: hidden;
}
header::after {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, #E8C4B8 0%, transparent 70%);
  opacity: 0.5;
  pointer-events: none;
}
.header-inner { max-width: 480px; margin: 0 auto; position: relative; }
.header-brand {
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: 0.5rem;
}
header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.6rem;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.02em;
  line-height: 1;
}
header h1 em { font-style: italic; color: var(--rose); }
.header-sub {
  font-size: 0.68rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--taupe);
  margin-top: 0.45rem;
}

/* ── CONTROLS ── */
.controls {
  background: var(--cream);
  border-bottom: 1px solid var(--divider);
  padding: 1rem 1.5rem;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 12px rgba(180,140,120,0.07);
}
.controls-inner { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.8rem; }

.search-wrap { position: relative; }
.search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--taupe); pointer-events: none; }
#searchInput {
  width: 100%;
  padding: 0.6rem 1rem 0.6rem 2.2rem;
  border: 1.5px solid var(--blush);
  border-radius: 24px;
  background: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem; font-weight: 300;
  color: var(--ink); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#searchInput:focus { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(200,148,138,0.12); }
#searchInput::placeholder { color: var(--taupe); }

.filter-group { display: flex; flex-direction: column; gap: 0.4rem; }
.filter-row { display: flex; gap: 0.35rem; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--taupe); min-width: 26px; }
.filter-btn {
  padding: 0.25rem 0.7rem;
  border: 1.5px solid var(--blush);
  border-radius: 20px;
  background: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem; font-weight: 300;
  color: var(--muted); cursor: pointer;
  transition: all 0.18s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--rose); color: var(--rose); background: #fff8f6; }
.filter-btn.active { background: var(--rose); border-color: var(--rose); color: #fff; font-weight: 400; }

/* ── TYPE TABS ── */
.type-tabs { padding: 0 1.5rem; border-bottom: 1px solid var(--divider); background: var(--cream); }
.type-tabs-inner { display: flex; gap: 1.5rem; max-width: 480px; margin: 0 auto; }
.type-tab {
  padding: 0.7rem 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem; font-weight: 300;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); background: none; border: none;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  cursor: pointer; transition: all 0.18s;
}
.type-tab.active { color: var(--rose); border-bottom-color: var(--rose); font-weight: 500; }

/* ── GRID ── */
.grid-wrap { max-width: 480px; margin: 0 auto; padding: 1rem; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.9rem; }

/* ── CARD ── */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 1.2rem 1rem 1rem;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(160,120,100,0.08);
  transition: transform 0.22s, box-shadow 0.22s;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(232,221,214,0.6);
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 16px 16px 0 0;
  background: var(--accent, #C8948A);
  opacity: 0;
  transition: opacity 0.18s;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(160,120,100,0.15);
}
/* scent bg tint on card */
.card-tint {
  position: absolute;
  top: 0; right: 0;
  width: 60px; height: 60px;
  border-radius: 0 16px 0 60px;
  opacity: 0.08;
  pointer-events: none;
}

.card-illust-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 0.8rem;
  padding: 0.5rem 0 0;
  pointer-events: none;
}
.card-illust {
  width: 38px;
  height: 56px;
  transition: transform 0.22s;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.18));
  pointer-events: none;
}
.card:hover .card-illust { transform: translateY(-4px); }

.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem; font-weight: 500;
  color: var(--ink); line-height: 1.2;
  margin-bottom: 0.15rem;
}
.card-latin {
  font-size: 0.63rem; font-style: italic;
  color: var(--taupe);
  margin-bottom: 0.55rem; line-height: 1.3;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; }
.card-tag {
  font-size: 0.6rem; letter-spacing: 0.06em;
  color: #fff; text-transform: uppercase;
  padding: 0.15rem 0.45rem; border-radius: 10px;
}
.card-blend-mark {
  position: absolute; top: 0.7rem; right: 0.8rem;
  font-size: 0.52rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--taupe);
  background: var(--petal); padding: 0.1rem 0.35rem; border-radius: 6px;
}

.card-methods {
  display: flex;
  gap: 0.3rem;
  margin-top: 0.5rem;
  flex-wrap: wrap;
}
.method-badge {
  display: flex;
  align-items: center;
  gap: 0.2rem;
  font-size: 0.58rem;
  letter-spacing: 0.04em;
  color: var(--taupe);
  background: var(--petal);
  border-radius: 10px;
  padding: 0.15rem 0.45rem;
}
.method-badge svg { flex-shrink: 0; }
#modalMethods .method-badge {
  font-size: 0.72rem;
  padding: 0.3rem 0.7rem;
  border-radius: 14px;
  gap: 0.3rem;
}
  grid-column: 1/-1; padding: 4rem 2rem; text-align: center;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 1.1rem; color: var(--taupe);
}

/* ── BLEND CHECKER ── */
#blendChecker {
  max-width: 480px;
  margin: 0 auto;
  padding: 1rem 1rem 4rem;
}
.bc-inner { display: flex; flex-direction: column; gap: 1.2rem; }
.bc-section { background: #fff; border-radius: 16px; padding: 1.1rem; box-shadow: 0 2px 10px rgba(160,120,100,0.07); }
.bc-title {
  font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--rose); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem;
}
.bc-count {
  background: var(--rose); color: #fff;
  font-size: 0.6rem; padding: 0.1rem 0.5rem; border-radius: 10px;
  letter-spacing: 0.04em; text-transform: none;
}
.bc-effect-row { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.bc-effect-btn {
  padding: 0.28rem 0.7rem; border-radius: 20px;
  border: 1.5px solid var(--blush); background: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 0.72rem;
  color: var(--muted); cursor: pointer; transition: all 0.18s;
}
.bc-effect-btn.active { color: #fff; border-color: transparent; }

.bc-oil-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem;
  max-height: 280px; overflow-y: auto;
}
.bc-oil-btn {
  padding: 0.4rem 0.3rem; border-radius: 10px;
  border: 1.5px solid var(--blush); background: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 0.68rem;
  color: var(--ink); cursor: pointer; transition: all 0.18s;
  text-align: center; line-height: 1.3;
}
.bc-oil-btn.selected { background: var(--rose); border-color: var(--rose); color: #fff; }

.bc-check-btn {
  width: 100%; padding: 0.8rem;
  background: linear-gradient(135deg, var(--rose), #B87870);
  color: #fff; border: none; border-radius: 24px;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.18s;
  box-shadow: 0 3px 12px rgba(200,148,138,0.3);
  margin-top: 0.5rem;
}
.bc-check-btn:hover { opacity: 0.88; }
.bc-check-btn:disabled { opacity: 0.4; cursor: not-allowed; }

#bcResult { margin-top: 0; }
.bc-result-inner {
  background: #fff; border-radius: 16px; padding: 1.2rem;
  box-shadow: 0 2px 10px rgba(160,120,100,0.07);
}
.bc-result-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem; color: var(--ink); margin-bottom: 0.75rem;
}
.bc-score {
  display: flex; align-items: center; gap: 0.5rem;
  margin-bottom: 1rem;
}
.bc-score-bar {
  flex: 1; height: 6px; border-radius: 6px;
  background: var(--blush); overflow: hidden;
}
.bc-score-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }
.bc-score-label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
.bc-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.9rem; }
.bc-tag {
  font-size: 0.65rem; color: #fff; padding: 0.18rem 0.55rem;
  border-radius: 10px; letter-spacing: 0.04em;
}
.bc-advice {
  font-size: 0.84rem; line-height: 1.7; color: var(--ink);
  margin-bottom: 0.9rem;
}
.bc-ratio {
  background: var(--petal); border-radius: 10px; padding: 0.75rem 0.9rem;
  font-size: 0.8rem; line-height: 1.7; color: var(--sand);
}
.bc-ratio strong {
  display: block; font-size: 0.62rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--rose); margin-bottom: 0.3rem; font-weight: 500;
}
.bc-loading { display: flex; gap: 5px; align-items: center; padding: 1rem 0; }
.bc-dot { width: 7px; height: 7px; background: var(--rose); border-radius: 50%; animation: bounce 1.2s infinite; }
.bc-dot:nth-child(2){animation-delay:0.2s} .bc-dot:nth-child(3){animation-delay:0.4s}
#overlay {
  display: none;
}
#modal {
  background: var(--cream);
  width: 100%;
  max-height: 82vh;
  overflow-y: auto;
  padding: 1.5rem 1.5rem 3rem;
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.25);
  position: relative;
}
#modalClose {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  background: var(--blush);
  border: none;
  border-radius: 20px;
  padding: 0.4rem 0.9rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  color: var(--taupe);
  cursor: pointer;
  margin-bottom: 1.2rem;
  transition: background 0.15s;
}
#modalClose:hover { background: var(--rose); color: #fff; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.modal-close {
  position: absolute; right: 1.25rem; top: 1.25rem;
  background: var(--blush); border: none; border-radius: 50%;
  width: 30px; height: 30px; font-size: 1rem;
  color: var(--taupe); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--rose); color: #fff; }

.modal-scent-line { width: 28px; height: 2px; border-radius: 2px; margin-bottom: 1rem; }
.modal-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem; font-weight: 400; color: var(--ink);
  line-height: 1.1; margin-bottom: 0.25rem;
}
.modal-latin { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.85rem; color: var(--taupe); margin-bottom: 1rem; }
.modal-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.4rem; }
.modal-badge {
  font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: #fff; padding: 0.2rem 0.6rem; border-radius: 12px;
}

.modal-section { margin-bottom: 1.3rem; }
.modal-section-title { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rose); margin-bottom: 0.4rem; }
.modal-section p { font-size: 0.875rem; line-height: 1.75; color: var(--ink); font-weight: 300; }
.modal-divider { height: 1px; background: var(--divider); margin: 1.3rem 0; }

.blend-list { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.blend-tag {
  font-size: 0.7rem; color: var(--taupe);
  padding: 0.22rem 0.65rem;
  border: 1.5px solid var(--blush); border-radius: 20px;
  background: #fff;
}

.doterra-note {
  margin-top: 1.2rem; padding: 0.9rem 1rem;
  background: var(--petal); border-radius: 10px;
  border-left: 3px solid var(--rose);
  font-size: 0.78rem; line-height: 1.7; color: var(--taupe);
}
.doterra-note strong {
  display: block; font-size: 0.6rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--rose);
  margin-bottom: 0.3rem; font-weight: 500;
}

/* ── AI SECTION ── */
.ai-section { margin-top: 1.4rem; padding-top: 1.3rem; border-top: 1px solid var(--divider); }
.ai-section-title { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sage); margin-bottom: 0.7rem; }
.ai-response { font-size: 0.84rem; line-height: 1.75; color: var(--ink); min-height: 48px; }
.ai-hint { font-size: 0.78rem; color: var(--taupe); font-style: italic; }

.ai-ask-btn {
  margin-top: 0.85rem; width: 100%; padding: 0.75rem;
  background: linear-gradient(135deg, var(--rose), #B87870);
  color: #fff; border: none; border-radius: 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.18s;
  box-shadow: 0 3px 12px rgba(200,148,138,0.3);
}
.ai-ask-btn:hover { opacity: 0.88; }

.ai-question-wrap { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
.ai-question-input {
  flex: 1; padding: 0.55rem 1rem;
  border: 1.5px solid var(--blush); border-radius: 20px;
  background: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 300; color: var(--ink); outline: none;
  transition: border-color 0.18s;
}
.ai-question-input:focus { border-color: var(--rose); }
.ai-question-input::placeholder { color: var(--taupe); }
.ai-send-btn {
  background: var(--sage); border: none; border-radius: 50%;
  width: 34px; height: 34px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.18s;
}
.ai-send-btn:hover { background: #6A9868; }

.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-track { background: transparent; }
.modal::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 4px; }

/* scrollbar */
.modal::-webkit-scrollbar { width: 4px; }
/* ── PASSWORD SCREEN ── */
#passwordScreen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  width: 100%; height: 100%;
  background: linear-gradient(160deg, #F8F0EC 0%, #EDE4DC 100%);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.pw-inner {
  width: 100%;
  max-width: 320px;
  padding: 2rem 1.5rem;
  text-align: center;
}
.pw-brand {
  font-size: 0.65rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: 0.5rem;
}
.pw-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 0.3rem;
}
.pw-title em { font-style: italic; color: var(--rose); }
.pw-sub {
  font-size: 0.75rem;
  color: var(--taupe);
  letter-spacing: 0.08em;
  margin-bottom: 2rem;
}
.pw-input {
  width: 100%;
  padding: 0.8rem 1rem;
  border: 1.5px solid var(--blush);
  border-radius: 24px;
  background: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  color: var(--ink);
  text-align: center;
  letter-spacing: 0.12em;
  outline: none;
  margin-bottom: 0.75rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.pw-input:focus {
  border-color: var(--rose);
  box-shadow: 0 0 0 3px rgba(200,148,138,0.15);
}
.pw-btn {
  width: 100%;
  padding: 0.8rem;
  background: linear-gradient(135deg, var(--rose), #B87870);
  color: #fff;
  border: none;
  border-radius: 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(200,148,138,0.3);
  transition: opacity 0.18s;
}
.pw-btn:hover { opacity: 0.88; }
.pw-error {
  font-size: 0.78rem;
  color: #C06848;
  margin-top: 0.6rem;
  min-height: 1.2rem;
  letter-spacing: 0.04em;
}
.pw-deco {
  width: 40px; height: 1.5px;
  background: var(--rose);
  margin: 1.5rem auto 0;
  opacity: 0.4;
}</style>
</head>

<div id="passwordScreen">
  <div class="pw-inner">
    <div class="pw-brand">dōTERRA</div>
    <div class="pw-title">精油 <em>図鑑</em></div>
    <div class="pw-sub">Essential Oil Reference</div>
    <input type="email" class="pw-input" id="emailInput" placeholder="メールアドレス" autocomplete="email" style="margin-bottom:0.6rem;">
    <input type="password" class="pw-input" id="pwInput" placeholder="パスワード" autocomplete="current-password">
    <button class="pw-btn" id="pwBtn">ログイン</button>
    <div class="pw-error" id="pwError"></div>
    <div class="pw-deco"></div>
  </div>
</div>

<header>
  <div class="header-inner">
    <div class="header-brand">dōTERRA</div>
    <h1>精油 <em>図鑑</em></h1>
    <div class="header-sub">Essential Oil Reference</div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="名前・効能・香りで絞り込む">
    </div>
    <div class="filter-group">
      <div class="filter-row">
        <span class="filter-label">香り</span>
        <button class="filter-btn active" data-scent="all">すべて</button>
        <button class="filter-btn" data-scent="floral" data-color="#C48FA8">フローラル</button>
        <button class="filter-btn" data-scent="citrus" data-color="#D4A040">シトラス</button>
        <button class="filter-btn" data-scent="woody"  data-color="#A8845C">ウッディ</button>

// ── LOGIN (GAS連携) ──
(function() {
  // ★ GASをデプロイしたらここにURLを貼る
  const GAS_URL = 'ここにGASのURLを貼り付けてください';

  const screen = document.getElementById('passwordScreen');
  const emailInput = document.getElementById('emailInput');
  const pwInput = document.getElementById('pwInput');
  const btn = document.getElementById('pwBtn');
  const err = document.getElementById('pwError');

  // セッション確認（ログイン済みなら即表示）
  const saved = sessionStorage.getItem('aroma_member');
  if (saved) {
    screen.style.display = 'none';
    return;
  }

  async function tryLogin() {
    const email = emailInput.value.trim();
    const pass = pwInput.value;

    if (!email || !pass) {
      err.textContent = 'メールアドレスとパスワードを入力してください';
      return;
    }

    btn.textContent = '確認中…';
    btn.disabled = true;
    err.textContent = '';

    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ email, pass })
      });
      const data = await res.json();

      if (data.ok) {
        sessionStorage.setItem('aroma_member', email);
        screen.style.display = 'none';
      } else {
        err.textContent = data.message || 'メールアドレスまたはパスワードが違います';
        pwInput.value = '';
        pwInput.focus();
      }
    } catch(e) {
      err.textContent = '通信エラーが発生しました。しばらく待ってから再試行してください。';
    }

    btn.textContent = 'ログイン';
    btn.disabled = false;
  }

  btn.addEventListener('click', tryLogin);
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') pwInput.focus(); });
})();

function methodBadges(methods) {
  return (methods || []).map(m => {
    const meta = METHOD_META[m];
    if (!meta) return '';
    return `<span class="method-badge" style="background:${meta.color}18;color:${meta.color}">${meta.icon}${meta.label}</span>`;
  }).join('');
}

let activeScentFilter = 'all';
let activeEffectFilter = 'all';
let activeTypeFilter = 'all';
let searchQuery = '';
let currentOil = null;

function renderGrid() {
  const grid = document.getElementById('grid');
  const q = searchQuery.toLowerCase();
  const filtered = OILS.filter(o => {
    const matchScent  = activeScentFilter  === 'all' || o.scent === activeScentFilter;
    const matchEffect = activeEffectFilter === 'all' || o.effects.includes(activeEffectFilter);
    const matchType   = activeTypeFilter   === 'all' || o.type  === activeTypeFilter;
    const matchSearch = !q ||
      o.name.includes(q) || o.latin.toLowerCase().includes(q) ||
      o.effectDesc.includes(q) || o.scentDesc.includes(q) ||
      o.effects.some(e => EFFECT_LABELS[e].includes(q)) ||
      (o.note && o.note.includes(q));
    return matchScent && matchEffect && matchType && matchSearch;
  });

  filtered.sort((a, b) => a.name.localeCompare(b.name, 'ja'));

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-result">該当する精油が見つかりませんでした</div>';
    return;
  }

  grid.innerHTML = filtered.map(o => {
    const c = SCENT_COLORS[o.scent];
    const tags = o.effects.map(e =>
      '<span class="card-tag" style="background:' + EFFECT_COLORS[e] + '">' + EFFECT_LABELS[e] + '</span>'
    ).join('');
    const methods = methodBadges(o.methods);
    const blend = o.type === 'blend' ? '<span class="card-blend-mark">blend</span>' : '';
    const illust = oilIllustration(o.id, o.scent);
    return '<div class="card" data-id="' + o.id + '" data-color="' + c + '">'
      + '<div class="card-tint" style="background:' + c + '"></div>'
      + blend
      + '<div class="card-illust-wrap">' + illust + '</div>'
      + '<div class="card-name">' + o.name + '</div>'
      + '<div class="card-latin">' + o.latin + '</div>'
      + '<div class="card-tags">' + tags + '</div>'
      + '<div class="card-methods">' + methods + '</div>'
      + '</div>';
  }).join('');

  // Use event delegation on grid instead of per-card listeners
  grid.onclick = function(e) {
    const card = e.target.closest('.card');
    if (!card) return;
    const oil = OILS.find(o => o.id === +card.dataset.id);
    if (oil) openModal(oil);
  };
}

function openModal(oil) {
  currentOil = oil;
  const c = SCENT_COLORS[oil.scent];
  document.getElementById('modalScentLine').style.background = c;
  document.getElementById('modalName').textContent = oil.name;
  document.getElementById('modalLatin').textContent = oil.latin;
  document.getElementById('modalBadges').innerHTML =
    '<span class="modal-badge" style="background:' + c + '">' + SCENT_LABELS[oil.scent] + '</span>' +
    oil.effects.map(e => '<span class="modal-badge" style="background:' + EFFECT_COLORS[e] + '">' + EFFECT_LABELS[e] + '</span>').join('') +
    (oil.type === 'blend'
      ? '<span class="modal-badge" style="background:var(--blend)">Blend</span>'
      : '<span class="modal-badge" style="background:var(--taupe)">Single</span>');
  document.getElementById('modalScent').textContent = oil.scentDesc;
  document.getElementById('modalEffects').textContent = oil.effectDesc;
  document.getElementById('modalUsage').textContent = oil.usage;
  document.getElementById('modalMethods').innerHTML = methodBadges(oil.methods);
  document.getElementById('modalBlends').innerHTML = oil.blends.map(b => '<span class="blend-tag">' + b + '</span>').join('');
  document.getElementById('modalNote').innerHTML = '<strong>dōTERRA memo</strong>' + oil.note;
  document.getElementById('aiResponse').innerHTML = '<span class="ai-hint">ボタンを押すと質問文がコピーされます。Claude.ai に貼り付けてご利用ください。</span>';
  document.getElementById('aiQuestionInput').value = '';
  document.getElementById('modal').scrollTop = 0;

  // Apply all overlay styles via JS to bypass any CSS cascade issues
  const ov = document.getElementById('overlay');
  ov.style.cssText = [
    'display:flex',
    'position:fixed',
    'top:0','left:0','right:0','bottom:0',
    'width:100vw','height:100vh',
    'background:rgba(58,48,40,0.5)',
    'z-index:99999',
    'align-items:flex-end',
    'justify-content:center',
    'box-sizing:border-box',
  ].join(';');
}

function closeModal() {
  const ov = document.getElementById('overlay');
  ov.style.cssText = 'display:none';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function buildPrompt(question) {
  return `dōTERRAの「${currentOil.name}」（${currentOil.latin}）について：${question}`;
}

async function askAI(question) {
  const prompt = buildPrompt(question);
  await navigator.clipboard.writeText(prompt).catch(() => {});
  const el = document.getElementById('aiResponse');
  el.innerHTML = `
    <div style="font-size:0.8rem;line-height:1.75;color:var(--sand);">
      <div style="font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--stone);margin-bottom:0.5rem;">コピーしました</div>
      <div style="padding:0.65rem 0.8rem;background:var(--paper);font-size:0.76rem;color:var(--muted);margin-bottom:0.75rem;border-left:2px solid var(--divider);">${prompt}</div>

        Claude.ai を開く →

}

  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); activeTypeFilter = btn.dataset.type; renderGrid();
  });
});
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value; renderGrid();
});

// ── BLEND CHECKER ──
let bcSelected = new Set();
let bcEffectFilter = 'all';

function initBlendChecker() {
  const effectRow = document.getElementById('bcEffectRow');
  const effects = [
    {key:'all', label:'すべて', color:'#C8948A'},
    {key:'relax', label:'リラックス', color:'#C48FA8'},
    {key:'focus', label:'集中', color:'#7A98B8'},
    {key:'sleep', label:'睡眠', color:'#8A7AAA'},
    {key:'energy', label:'活力', color:'#D4A040'},
    {key:'skin', label:'スキンケア', color:'#C87890'},
    {key:'immune', label:'免疫', color:'#7AAA88'},
    {key:'digest', label:'消化', color:'#C88858'},
    {key:'breath', label:'呼吸', color:'#6AAAB0'},
  ];
  effectRow.innerHTML = effects.map(e =>
    '<button class="bc-effect-btn' + (e.key==='all'?' active':'') + '" data-effect="' + e.key + '" data-color="' + e.color + '" style="' + (e.key==='all'?'background:'+e.color+';color:#fff;border-color:'+e.color:'') + '">' + e.label + '</button>'
  ).join('');
  effectRow.querySelectorAll('.bc-effect-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      effectRow.querySelectorAll('.bc-effect-btn').forEach(b => {
        b.classList.remove('active');
        b.style.background=''; b.style.color=''; b.style.borderColor='';
      });
      this.classList.add('active');
      const col = this.dataset.color;
      this.style.background=col; this.style.color='#fff'; this.style.borderColor=col;
      bcEffectFilter = this.dataset.effect;
      renderBcOils();
    });
  });
  renderBcOils();
}

function renderBcOils() {
  const grid = document.getElementById('bcOilGrid');
  const filtered = OILS.filter(o =>
    o.type === 'single' && (bcEffectFilter === 'all' || o.effects.includes(bcEffectFilter))
  ).sort((a,b) => a.name.localeCompare(b.name, 'ja'));

  grid.innerHTML = filtered.map(o =>
    '<button class="bc-oil-btn' + (bcSelected.has(o.id) ? ' selected' : '') + '" data-id="' + o.id + '">' + o.name + '</button>'
  ).join('') +
  '<button class="bc-check-btn" id="bcCheckBtn"' + (bcSelected.size < 2 ? ' disabled' : '') + ' style="grid-column:1/-1">相性をチェック ✨</button>';

  grid.querySelectorAll('.bc-oil-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const id = +this.dataset.id;
      if (bcSelected.has(id)) { bcSelected.delete(id); this.classList.remove('selected'); }
      else { bcSelected.add(id); this.classList.add('selected'); }
      document.getElementById('bcCount').textContent = bcSelected.size + '種類選択中';
      const cb = document.getElementById('bcCheckBtn');
      if (cb) cb.disabled = bcSelected.size < 2;
    });
  });

  const checkBtn = document.getElementById('bcCheckBtn');
  if (checkBtn) {
    checkBtn.addEventListener('click', async function() {
      if (bcSelected.size < 2) return;
      await runBlendCheck(OILS.filter(o => bcSelected.has(o.id)));
    });
  }
}

async function runBlendCheck(oils) {
  const resultEl = document.getElementById('bcResult');
  const innerEl = document.getElementById('bcResultInner');
  resultEl.style.display = 'block';
  innerEl.innerHTML = '<div class="bc-loading"><div class="bc-dot"></div><div class="bc-dot"></div><div class="bc-dot"></div></div>';
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const names = oils.map(o => o.name).join('、');
  const prompt = 'dōTERRAの精油ブレンド相性チェック。以下の精油の組み合わせを評価してください：' + names + '\n\n以下の形式でJSONのみで返してください（コードブロック不要）：\n{"score":85,"scoreLabel":"相性◎","summary":"一言コメント","effects":["効能1","効能2"],"advice":"詳しいアドバイス2〜3文","ratio":"配合比率の目安","caution":"注意事項"}';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        system: 'あなたはdōTERRAアロマ専門家です。JSON形式のみで返答してください。前置き・説明・コードブロック不要。',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    const result = JSON.parse(text.replace(/```json|```/g,'').trim());
    const sc = result.score >= 80 ? '#7AAA88' : result.score >= 60 ? '#D4A040' : '#C06848';
    innerEl.innerHTML =
      '<div class="bc-result-title">🌿 ' + oils.map(o=>o.name).join(' × ') + '</div>' +
      '<div class="bc-score"><div class="bc-score-bar"><div class="bc-score-fill" style="width:'+result.score+'%;background:'+sc+'"></div></div><span class="bc-score-label" style="color:'+sc+'">'+result.scoreLabel+' ('+result.score+'/100)</span></div>' +
      '<div class="bc-tags">' + (result.effects||[]).map(e=>'<span class="bc-tag" style="background:var(--rose)">'+e+'</span>').join('') + '</div>' +
      '<div class="bc-advice">'+result.summary+'<br><br>'+result.advice+'</div>' +
      '<div class="bc-ratio"><strong>おすすめ配合比率</strong>'+result.ratio+(result.caution?'<br><br>⚠️ '+result.caution:'')+'</div>';
  } catch(e) {
    const q = 'dōTERRAの「'+names+'」の組み合わせの相性・配合比率・効能・注意事項を教えてください。';
    await navigator.clipboard.writeText(q).catch(()=>{});
    innerEl.innerHTML =
      '<div class="bc-result-title">📋 質問をコピーしました</div>' +
      '<div class="bc-advice">「'+names+'」の相性チェック用の質問をコピーしました。Claude.aiに貼り付けてご利用ください。</div>' +
      '<a href="https://claude.ai" target="_blank" style="font-size:0.72rem;letter-spacing:0.1em;color:var(--ink);border-bottom:1px solid var(--ink);">Claude.ai を開く →</a>';
  }
}

document.getElementById('blendCheckerTab').addEventListener('click', function() {
  document.querySelectorAll('.type-tab').forEach(t => { t.classList.remove('active'); t.style.color=''; t.style.borderBottomColor=''; });
  this.classList.add('active');
  document.querySelector('.grid-wrap').style.display = 'none';
  document.getElementById('blendChecker').style.display = 'block';
  if (!document.getElementById('bcOilGrid').children.length) initBlendChecker();
});
document.querySelectorAll('[data-type]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelector('.grid-wrap').style.display = 'block';
    document.getElementById('blendChecker').style.display = 'none';
  });
});

renderGrid();
</script>
</body>
